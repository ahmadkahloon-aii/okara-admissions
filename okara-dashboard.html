<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Okara Admissions — Superior University</title>
<style>
:root{
  --purple:#6D2C91; --purple-dark:#4E1E6B; --purple-light:#8E44AD;
  --gold:#C9A227; --gold-light:#E5C766;
  --bg:#F6F3F9; --card:#FFFFFF; --ink:#1f1330; --muted:#6b6478;
  --line:#E7E0EF; --green:#1f9d55; --red:#d23c3c; --amber:#d08700;
  --shadow:0 1px 3px rgba(78,30,107,.08),0 6px 20px rgba(78,30,107,.06);
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
a{color:var(--purple);text-decoration:none}
h1,h2,h3{margin:0 0 .4em}
button{font:inherit;cursor:pointer}
input,select,textarea{font:inherit}

/* ---------- layout ---------- */
.app{display:flex;min-height:100vh}
.sidebar{width:236px;background:linear-gradient(180deg,var(--purple-dark),var(--purple));
  color:#fff;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.brand{padding:22px 20px;border-bottom:1px solid rgba(255,255,255,.12)}
.brand .logo{font-weight:800;font-size:18px;letter-spacing:.3px}
.brand .sub{font-size:11px;opacity:.8;margin-top:2px}
.brand .gold{color:var(--gold-light)}
.nav{padding:12px 10px;flex:1;overflow:auto}
.nav a{display:flex;align-items:center;gap:10px;color:#efe7f6;padding:11px 14px;border-radius:10px;
  font-size:14px;margin-bottom:3px}
.nav a:hover{background:rgba(255,255,255,.10)}
.nav a.active{background:rgba(255,255,255,.18);color:#fff;font-weight:600}
.nav a .ico{width:18px;text-align:center}
.sidefoot{padding:14px 18px;border-top:1px solid rgba(255,255,255,.12);font-size:12px}
.sidefoot button{background:rgba(255,255,255,.14);color:#fff;border:none;padding:8px 12px;
  border-radius:8px;width:100%;margin-top:8px}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{background:var(--card);border-bottom:1px solid var(--line);padding:16px 26px;
  display:flex;justify-content:space-between;align-items:center}
.topbar h1{font-size:19px;margin:0}
.content{padding:24px 26px;flex:1}

/* ---------- cards / grid ---------- */
.grid{display:grid;gap:16px}
.cols-4{grid-template-columns:repeat(4,1fr)}
.cols-3{grid-template-columns:repeat(3,1fr)}
.cols-2{grid-template-columns:1fr 1fr}
@media(max-width:980px){.cols-4,.cols-3,.cols-2{grid-template-columns:1fr 1fr}}
@media(max-width:640px){.cols-4,.cols-3,.cols-2{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:var(--shadow)}
.card h3{font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700}
.stat{font-size:30px;font-weight:800;color:var(--purple)}
.stat .unit{font-size:13px;color:var(--muted);font-weight:600;margin-left:6px}
.kpi-accent{height:3px;width:42px;background:var(--gold);border-radius:3px;margin-top:10px}

/* ---------- tables ---------- */
table{width:100%;border-collapse:collapse;font-size:14px}
th{text-align:left;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.4px;
  padding:10px 12px;border-bottom:2px solid var(--line)}
td{padding:11px 12px;border-bottom:1px solid var(--line)}
tr:hover td{background:#faf8fc}
.clickable{cursor:pointer}

/* ---------- badges ---------- */
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:600;
  background:#efe7f6;color:var(--purple)}
.badge.green{background:#e4f6ec;color:var(--green)}
.badge.red{background:#fce6e6;color:var(--red)}
.badge.amber{background:#fcf0d9;color:var(--amber)}
.badge.grey{background:#eee;color:#555}

/* ---------- forms / buttons ---------- */
label{display:block;font-size:13px;font-weight:600;color:var(--ink);margin:12px 0 5px}
.input,input[type=text],input[type=password],input[type=email],select,textarea{
  width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:9px;background:#fff;outline:none}
.input:focus,input:focus,select:focus,textarea:focus{border-color:var(--purple-light);
  box-shadow:0 0 0 3px rgba(142,68,173,.12)}
.btn{background:var(--purple);color:#fff;border:none;padding:10px 16px;border-radius:9px;font-weight:600}
.btn:hover{background:var(--purple-dark)}
.btn.gold{background:var(--gold);color:#2a2113}.btn.gold:hover{background:#b89220}
.btn.ghost{background:#fff;color:var(--purple);border:1px solid var(--line)}
.btn.ghost:hover{background:#faf8fc}
.btn.sm{padding:6px 11px;font-size:13px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.spread{display:flex;justify-content:space-between;align-items:center;gap:12px}

/* ---------- login ---------- */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--purple-dark),var(--purple-light))}
.login-card{background:#fff;border-radius:18px;padding:34px;width:380px;max-width:92vw;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.login-card .logo{font-weight:800;font-size:22px;color:var(--purple)}
.login-card .gold{color:var(--gold)}

/* ---------- chat ---------- */
.chat{display:flex;flex-direction:column;height:calc(100vh - 220px);min-height:360px}
.chat-scroll{flex:1;overflow:auto;padding:14px;background:#faf8fc;border-radius:12px;border:1px solid var(--line)}
.bubble{max-width:74%;padding:9px 13px;border-radius:14px;margin:7px 0;font-size:14px;line-height:1.4;white-space:pre-wrap}
.bubble.in{background:#fff;border:1px solid var(--line);border-bottom-left-radius:4px}
.bubble.out{background:var(--purple);color:#fff;margin-left:auto;border-bottom-right-radius:4px}
.bubble.sys{background:#fff7e6;border:1px dashed var(--gold);color:#6a5300;font-size:12.5px;margin:7px auto}
.bubble .meta{font-size:10.5px;opacity:.7;margin-top:4px}
.composer{display:flex;gap:8px;margin-top:10px}
.muted{color:var(--muted)}.small{font-size:13px}
.hr{height:1px;background:var(--line);margin:16px 0}
.pill-tabs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.pill-tabs button{background:#fff;border:1px solid var(--line);padding:7px 14px;border-radius:20px;color:var(--muted)}
.pill-tabs button.active{background:var(--purple);color:#fff;border-color:var(--purple)}
.notice{padding:11px 14px;border-radius:10px;font-size:13.5px;margin-bottom:14px}
.notice.ok{background:#e4f6ec;color:#13632f}
.notice.err{background:#fce6e6;color:#8a2020}
.notice.info{background:#eef3ff;color:#1f3a8a}
.funnel-row{display:flex;align-items:center;gap:12px;margin:8px 0}
.funnel-bar{height:26px;background:linear-gradient(90deg,var(--purple),var(--purple-light));border-radius:6px;min-width:4px}
.funnel-label{width:150px;font-size:13px}
.funnel-count{font-weight:700;color:var(--purple)}
.loading{padding:40px;text-align:center;color:var(--muted)}

</style>
</head>
<body>
<div id="root"></div>
